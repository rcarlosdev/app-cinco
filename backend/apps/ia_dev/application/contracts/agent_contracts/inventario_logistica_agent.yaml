      planner_required: true
      handler_required: false
      allowed_tables: [logistica_movimientos_consumo, base_codigos]
      blocked_tables: []
      response_shape: table
      rollout_flag: IA_DEV_QUERY_SQL_ASSISTED_ENABLED
      policy_tags: [contains_operational_data]
    - id: inventory_consumption_by_dimension
      type: sql_assisted
      owner: query_execution_planner.inventory
      planner_required: true
      handler_required: false
      allowed_tables: [logistica_movimientos_consumo, base_codigos]
      blocked_tables: []
      response_shape: table
      rollout_flag: IA_DEV_QUERY_SQL_ASSISTED_ENABLED
      policy_tags: [contains_operational_data]
    - id: inventory_transfer_warehouse
      type: sql_assisted
      owner: query_execution_planner.inventory
      planner_required: true
      handler_required: false
      allowed_tables: [logistica_movimientos_traslado, base_codigos]
      blocked_tables: []
      response_shape: table
      rollout_flag: IA_DEV_QUERY_SQL_ASSISTED_ENABLED
      policy_tags: [contains_operational_data]
    - id: inventory_transfer_other_ally
      type: sql_assisted
      owner: query_execution_planner.inventory
      planner_required: true
      handler_required: false
      allowed_tables: [logistica_movimientos_traslado, base_codigos]
      blocked_tables: []
      response_shape: table
      rollout_flag: IA_DEV_QUERY_SQL_ASSISTED_ENABLED
      policy_tags: [contains_operational_data]
    - id: inventory_serial_association_departures
      type: sql_assisted
      owner: query_execution_planner.inventory
      planner_required: true
      handler_required: false
      allowed_tables: [logistica_seriales_asociados]
      blocked_tables: []
      response_shape: table
      rollout_flag: IA_DEV_QUERY_SQL_ASSISTED_ENABLED
      policy_tags: [contains_operational_data]
    - id: inventory_entries_by_month
      type: sql_assisted
      owner: query_execution_planner.inventory
      planner_required: true
      handler_required: false
      allowed_tables: [logistica_movimientos_entrada]
      blocked_tables: []
      response_shape: table
      rollout_flag: IA_DEV_QUERY_SQL_ASSISTED_ENABLED
      policy_tags: [contains_operational_data]
    - id: inventory_movement_detail
      type: sql_assisted
      owner: query_execution_planner.inventory
      planner_required: true
      handler_required: false
      allowed_tables: [logistica_movimientos_entrada, logistica_movimientos_entrega, logistica_movimientos_devolucion, logistica_movimientos_consumo, logistica_movimientos_cobro, logistica_movimientos_traslado]
      blocked_tables: []
      response_shape: table
      rollout_flag: IA_DEV_QUERY_SQL_ASSISTED_ENABLED
      policy_tags: [contains_operational_data]
    - id: inventory_kardex_consolidated
      type: sql_assisted
      owner: query_execution_planner.inventory
      planner_required: true
      handler_required: false
      allowed_tables: [logistica_movimientos_entrada, logistica_movimientos_entrega, logistica_movimientos_devolucion, logistica_movimientos_consumo, logistica_movimientos_cobro, logistica_movimientos_traslado]
      blocked_tables: []
      response_shape: table
      rollout_flag: IA_DEV_QUERY_SQL_ASSISTED_ENABLED
      policy_tags: [contains_operational_data]
    - id: inventory_consumption_billing_operacion_hfc
      type: sql_assisted
      owner: query_execution_planner.inventory
      planner_required: true
      handler_required: false
      allowed_tables: [logistica_movimientos_consumo, a_promedios_consumo, bd_c3nc4s1s.facturacion_facturado_wfm]
      blocked_tables: []
      response_shape: table
      rollout_flag: IA_DEV_QUERY_SQL_ASSISTED_ENABLED
      policy_tags: [contains_operational_data]
    - id: inventory_semantic_report
      type: semantic_only
      owner: inventory.semantic_report
      planner_required: false
      handler_required: false
      allowed_tables: []
      blocked_tables: []
      response_shape: summary
      rollout_flag: null
      policy_tags: [contains_operational_data]
    - id: inventory_document_generation_pending
      type: external_pending
      owner: inventory.document_generation
      planner_required: false
      handler_required: false
      allowed_tables: []
      blocked_tables: []
      response_shape: summary
      rollout_flag: null
      policy_tags: [contains_operational_data]
  routing_rules:
    deterministic_patterns: ["stock", "inventario", "bodega", "serial", "kardex", "consumo", "traslado"]
    semantic_assist_enabled: true
    domain_priority_rules: ["inventory_pre_router_has_priority_when_inventory_terms_are_strong"]
    memory_isolation: strict_by_domain_and_capability
  semantic_assist_rules:
    - YAML teaches business semantics and ai_dictionary governs structural execution.
    - SQL must never be generated directly from YAML.
  execution_rules:
    covered_by_modern_runtime: true
    legacy_runtime_owner: inventory_legacy_runtime
  validation_rules:
    - dictionary_table_mapping_required
    - serial_filter_required
    - codigo_filter_required
  handoffs:
    allowed_targets: [analista_agent]
    payload_schema: agent_contract.v1.handoff
    required_fields: [domain, intent, filters]
  fallback_policy:
    legacy_allowed: false
    user_visible_error_policy: controlled_limitation
    technical_debug_visibility: hidden_from_end_user
  response_policy:
    user_mode: business
    debug_mode: internal_only
    required_sections: [reply, data]
    forbidden_terms: [runtime_only_fallback, piloto analytics, completar ai_dictionary, legacy]
  memory_policy:
    scope: session_user_and_business
    cross_domain_sharing: blocked_except_handoff
  observability:
    required_trace_fields: [agent_id, domain, intent, capability, route, execute, fallback_used, planner_called, block_reason]
  tests_required:
    - contract_loads
    - intents_have_capabilities
    - capabilities_have_handler_or_planner
    - frontend_simulator_parity
