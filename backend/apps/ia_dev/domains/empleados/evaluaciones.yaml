evaluaciones:
  - id: empleados_runtime_eval_v1
    descripcion: >
      Eval anti-hardcode para la fase actual de empleados con conteo simple,
      agrupaciones declaradas, detalle seguro y cumpleanos gobernados por pack,
      manteniendo fallback trazado solo en ambiguedades y rutas pendientes
      declaradas.
    casos:
      - caso_id: empleados_personal_activo_hoy_pack
        consulta: personal activo hoy
        expectativa:
          template_id: count_entities_by_status
          candidate_capability: empleados.count.active.v1
          source: capability_pack
          fallback_used: false
          legacy_mapping_used: false
      - caso_id: empleados_por_area_pack
        consulta: empleados por area
        expectativa:
          template_id: aggregate_by_group_and_period
          candidate_capability: empleados.count.active.v1
          source: capability_pack
          fallback_used: false
          legacy_mapping_used: false
