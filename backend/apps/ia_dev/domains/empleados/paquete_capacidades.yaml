nombre_paquete: empleados
dominio: empleados
version: 0.4.0
fase_migracion: cuarta_capacidad_cumpleanos_gobernada
descripcion: >
  Capability Pack de empleados para migrar las consultas de conteo general,
  agrupaciones organizacionales, detalle seguro y cumpleanos gobernados sin
  mover planner, SQL ni runtime general.
procesos_operativos:
  - conteo de personal activo o inactivo
  - agrupacion de personal por area, cargo, sede, carpeta, supervisor y movil
  - detalle seguro por cedula, movil, nombre y filtros organizacionales declarados
  - cumpleanos de empleados por mes, dimension segura y detalle filtrado
  - diagnostico de rutas pendientes para rotacion y certificados
entidades:
  - empleados
  - cedula
  - movil
  - nombre
  - area
  - cargo
  - supervisor
  - carpeta
  - sede
  - tipo_labor
  - estado
  - fecha_nacimiento
  - fnacimiento_month
  - birth_month
fuentes_metadata_gobernada:
  - ai_dictionary.dd_tablas
  - ai_dictionary.dd_campos
  - ai_dictionary.dd_relaciones
  - ai_dictionary.dd_sinonimos
  - ai_dictionary.dd_reglas
  - ai_dictionary.ia_dev_capacidades_columna
limitaciones_declaradas:
  - empleados.limit.grouped_population_undeclared_dimension
  - empleados.limit.grouped_population_ambiguous_request
  - empleados.limit.grouped_population_metadata_gap
  - empleados.limit.detail_unverifiable_entity
  - empleados.limit.detail_undeclared_filter
  - empleados.limit.detail_ambiguous_request
  - empleados.limit.detail_insufficient_metadata
  - empleados.limit.birthday_ambiguous_period
  - empleados.limit.birthday_ungoverned_date_field
  - empleados.limit.birthday_insufficient_metadata
  - empleados.limit.heights_certificate_pending_pack
  - empleados.limit.turnover_pending_pack
  - empleados.limit.missingness_pending_pack
  - empleados.limit.sensitive_fields_hidden
mapa_capacidades_actual:
  - capability_id: empleados.count.active.v1
    templates_actuales:
      - count_entities_by_status
      - aggregate_by_group_and_period
      - count_records_by_period
    rutas_actuales:
      - handler
      - sql_assisted
    observacion: >
      Capability vigente para conteo, agrupaciones, cumpleanos, rotacion y
      varios rescates modernos de empleados. En esta fase se gobiernan por pack
      el conteo simple, las agrupaciones declaradas y el conteo de cumpleanos
      por mes.
  - capability_id: empleados.detail.v1
    templates_actuales:
      - detail_by_entity_and_period
    rutas_actuales:
      - handler
    observacion: >
      Detalle seguro por cedula, movil, nombre y filtros organizacionales
      declarados. En esta fase deja de depender del fallback legacy para los
      filtros, entidades verificables y detalle filtrado de cumpleanos por mes.
templates_candidatos:
  - template_id: count_entities_by_status
    estado: activo_pack_driven
    capability_id: empleados.count.active.v1
    response_profile: empleados.count.active.summary
  - template_id: aggregate_by_group_and_period
    estado: activo_pack_driven
    capability_id: empleados.count.active.v1
    response_profile: empleados.count.grouped.summary
  - template_id: detail_by_entity_and_period
    estado: activo_pack_driven
    capability_id: empleados.detail.v1
    response_profile: empleados.detail.safe_table
  - template_id: count_records_by_period
    estado: activo_pack_driven
    capability_id: empleados.count.active.v1
    response_profile: empleados.birthday.summary
  - template_id: heights_certificate_summary
    estado: candidato_pendiente
    capability_id: empleados.count.active.v1
    response_profile: empleados.certificados_alturas.summary
perfiles_respuesta_candidatos:
  - empleados.count.active.summary
  - empleados.count.grouped.summary
  - empleados.detail.safe_table
  - empleados.birthday.summary
  - empleados.certificados_alturas.summary
semantic_bindings:
  - template_id: count_entities_by_status
    candidate_capability: empleados.count.active.v1
    planner_route_hint: empleados.population.count
    response_profile: empleados.count.active.summary
    tool_id: empleados.count.active.v1
    intent_ids:
      - count
      - summary
    entity_fields:
      - empleados
      - estado
      - tipo_labor
    filter_fields:
      - estado
      - tipo_labor
    grouping_fields: []
    output_profiles:
      - kpi_total_personal
    selection_rules:
      - priority: 98
        intent_ids:
          - count
          - summary
        required_status_values:
          - ACTIVO
          - INACTIVO
        normalized_filters_absent:
          - cedula
          - cedula_empleado
          - identificacion
          - documento
          - id_empleado
          - movil
          - codigo_sap
          - nombre
          - search
        group_by_absent: true
        metrics_absent:
          - turnover_rate
        forbid_business_concepts:
          - birthday
          - turnover
          - heights_certificate_validity
          - missingness
        declared_rules:
          - empleados.route.population_count
          - empleados.default.status_active
