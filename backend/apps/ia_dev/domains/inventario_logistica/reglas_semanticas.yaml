reglas:
  - id: inventario.route.stock_balance_holder
    descripcion: Inventario operativo por cedula o movil se organiza como saldo por portador.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.stock_balance_holder
        - inventario.scope.dual_block_unspecified_family
      dd_sinonimos:
        - inventario.entity.movil
        - inventario.entity.cedula
      ia_dev_capacidades_columna:
        - cedula
        - movil
        - tipo
  - id: inventario.route.stock_balance_material_grouped_dimension
    descripcion: Saldo o inventario de material filtrado por codigo o descripcion se agrega por la dimension solicitada.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.stock_balance_material_grouped_dimension
        - inventario.metric.stock_include_zero_negative
      dd_sinonimos:
        - inventario.entity.movil
        - inventario.entity.cedula
        - inventario.entity.bodega
      ia_dev_capacidades_columna:
        - codigo
        - descripcion
        - tipo
        - movil
        - cedula
        - bodega
  - id: inventario.route.serial_stock_family_grouped_dimension
    descripcion: Saldo serializado por familia se agrega por movil, tecnico o bodega usando el catalogo gobernado.
    metadata_gobernada:
      dd_reglas:
        - inventario.serial_family.busqueda_parcial_catalogo
        - inventario.route.serial_stock_family_grouped_dimension
        - inventario.metric.serial_count_only
      dd_sinonimos:
        - inventario.family.serializados
      ia_dev_capacidades_columna:
        - familia
        - movil
        - cedula
        - bodega
        - codigo
  - id: inventario.route.serial_stock_dimension
    descripcion: Stock serializado por estado, bodega, ubicacion o codigo usa la ruta declarada por dimension.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.serial_stock_dimension
        - inventario.metric.serial_count_only
      dd_sinonimos:
        - inventario.family.serializados
      ia_dev_capacidades_columna:
        - estado
        - bodega
        - codigo
  - id: inventario.route.risk_consumo_movil_sin_validar
    descripcion: Riesgo de consumo movil sin validar usa la ruta declarada de serializados.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.risk_consumo_movil_sin_validar
        - inventario.metric.serial_count_only
      dd_sinonimos:
        - inventario.family.serializados
      ia_dev_capacidades_columna:
        - serial
        - codigo
        - estado
        - fecha
  - id: inventario.route.consumption_top
    descripcion: Los materiales mas consumidos se gobiernan por la ruta declarada de top de consumo.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.consumption_top
      dd_sinonimos:
        - inventario.intent.movement_history
      ia_dev_capacidades_columna:
        - codigo
        - descripcion
        - tipo
        - fecha
  - id: inventario.route.consumption_dimension
    descripcion: El detalle de consumos filtrado por movil, cedula o periodo usa la ruta declarada por dimension operativa.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.consumption_top
      dd_sinonimos:
        - inventario.intent.movement_history
        - inventario.entity.movil
        - inventario.entity.cedula
      ia_dev_capacidades_columna:
        - codigo
        - cantidad
        - fecha
        - movil
        - cedula
  - id: inventario.route.movement_detail
    descripcion: El detalle operativo de movimientos sin agrupacion mensual usa la ruta declarada del dominio.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.movement_detail
      dd_sinonimos:
        - inventario.intent.movement_history
      ia_dev_capacidades_columna:
        - codigo
        - fecha
        - bodega
  - id: inventario.route.reconciliation_operacion_hfc
    descripcion: Consumo versus facturacion en operacion_hfc usa la ruta declarada de conciliacion HFC.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.reconciliation_operacion_hfc
      dd_sinonimos:
        - inventario.entity.bodega
      ia_dev_capacidades_columna:
        - codigo
        - orden_trabajo
        - tipo
        - bodega
  - id: inventario.route.kardex_employee
    descripcion: Kardex por tecnico o empleado se resuelve por cedula.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.kardex_employee
        - inventario.kardex.signos_operativos
      dd_sinonimos:
        - inventario.intent.movement_history
        - inventario.entity.cedula
      ia_dev_capacidades_columna:
        - cedula
        - codigo
        - fecha
  - id: inventario.route.kardex_codigo
    descripcion: Kardex consolidado por codigo aplica cuando no existe cedula del portador.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.kardex_codigo
      dd_sinonimos:
        - inventario.intent.movement_history
      ia_dev_capacidades_columna:
        - codigo
        - fecha
  - id: inventario.route.serial_holder
    descripcion: La consulta serializada por portador usa la ruta dedicada de seriales.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.serial_holder
        - inventario.metric.serial_count_only
      dd_sinonimos:
        - inventario.family.serializados
      ia_dev_capacidades_columna:
        - serial
        - movil
        - cedula
  - id: inventario.scope.dual_block_unspecified_family
    descripcion: Inventario generico por portador sin familia explicita muestra materiales y serializados.
    metadata_gobernada:
      dd_reglas:
        - inventario.scope.dual_block_unspecified_family
      dd_sinonimos:
        - inventario.entity.movil
        - inventario.entity.cedula
      ia_dev_capacidades_columna:
        - movil
        - cedula
  - id: inventario.metric.stock_include_zero_negative
    descripcion: Los saldos operativos deben conservar positivos, cero y negativos.
    metadata_gobernada:
      dd_reglas:
        - inventario.metric.stock_include_zero_negative
      dd_sinonimos:
        - inventario.family.material_generico
      ia_dev_capacidades_columna:
        - tipo
  - id: inventario.route.critical_materials_by_employee
    descripcion: Materiales criticos por empleado, tecnico, movil o cuadrilla usan la ruta declarada de criticidad por cobertura.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.critical_materials_by_employee
      dd_sinonimos:
        - inventario.entity.movil
        - inventario.entity.cedula
        - inventario.entity.bodega
      ia_dev_capacidades_columna:
        - cedula
        - movil
        - bodega
        - codigo
        - descripcion
        - tipo
  - id: inventario.metric.serial_count_only
    descripcion: Serializados y equipos se gobiernan por conteo, no por cantidad.
    metadata_gobernada:
      dd_reglas:
        - inventario.metric.serial_count_only
      dd_sinonimos:
        - inventario.family.serializados
      ia_dev_capacidades_columna:
        - serial
        - estado
  - id: inventario.kardex.signos_operativos
    descripcion: Entrega suma; devolucion, consumo y cobro restan en el kardex.
    metadata_gobernada:
      dd_reglas:
        - inventario.kardex.signos_operativos
      dd_sinonimos:
        - inventario.intent.movement_history
      ia_dev_capacidades_columna:
        - fecha
        - codigo
  - id: inventario.limit.document_generation_pending
    descripcion: SAP, actas y documentos se declaran como limitacion, no como dato inventado.
    metadata_gobernada:
      dd_reglas:
        - inventario.limit.document_generation_pending
      dd_sinonimos:
        - inventario.entity.cedula
      ia_dev_capacidades_columna:
        - cedula
  - id: inventario.limit.transfer_destination_missing_metadata
    descripcion: Bodega destino no se habilita sin metadata fisica segura.
    metadata_gobernada:
      dd_reglas:
        - inventario.limit.transfer_destination_missing_metadata
      dd_sinonimos:
        - inventario.entity.bodega
      ia_dev_capacidades_columna:
        - bodega
  - id: inventario.route.transfer_warehouse
    descripcion: Traslado de bodega se documenta como ruta operativa segura sin bodega destino.
    metadata_gobernada:
      dd_reglas:
        - inventario.limit.transfer_destination_missing_metadata
      dd_sinonimos:
        - inventario.entity.bodega
      ia_dev_capacidades_columna:
        - bodega
  - id: inventario.route.transfer_other_ally
    descripcion: Traslados a otro aliado usan la ruta declarada del dominio.
    metadata_gobernada:
      dd_reglas:
        - inventario.limit.transfer_destination_missing_metadata
      dd_sinonimos:
        - inventario.entity.bodega
      ia_dev_capacidades_columna:
        - bodega
  - id: inventario.route.provider_serial_validation
    descripcion: La validacion de seriales externos con archivo adjunto usa la capability gobernada del dominio.
    metadata_gobernada:
      dd_reglas:
        - inventario.route.provider_serial_validation
      dd_sinonimos:
        - inventario.intent.provider_serial_validation.proveedor
        - inventario.intent.provider_serial_validation.archivo
      ia_dev_capacidades_columna:
        - serial
        - estado
        - cedula
        - movil
        - bodega
        - codigo
        - descripcion
        - fecha
