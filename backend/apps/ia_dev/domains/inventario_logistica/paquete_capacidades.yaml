nombre_paquete: inventario_logistica
dominio: inventario_logistica
version: 1.2.0
descripcion: >
  Capability Pack empresarial para incorporar procesos operativos de inventario y logistica
  sobre metadata gobernada, capabilities declaradas y respuesta evidence-first.
procesos_operativos:
  - inventario operativo por tecnico, empleado, movil, cuadrilla o brigada
  - inventario de materiales y ferretero
  - inventario serializado de equipos y CPE
  - validacion de seriales externos de proveedor contra bases actuales e historicas
  - kardex y movimientos por empleado o codigo
  - limitaciones documentales SAP, actas y documentos no habilitados
entidades:
  - cedula
  - movil
  - codigo
  - serial
  - bodega
fuentes_metadata_gobernada:
  - ai_dictionary.dd_sinonimos
  - ai_dictionary.dd_reglas
  - ai_dictionary.ia_dev_capacidades_columna
limitaciones_declaradas:
  - documentos_sap_y_actas_no_habilitados
  - missing_physical_column:bodega_destino
  - serializados_employee_kardex_not_available
  - result_set_empty
  - aclaracion_portador_requerida
  - scope_required:operacion_hfc
  - attachment_required
  - provider_file_empty
  - serial_column_not_detected
semantic_bindings:
  - template_id: inventory_material_stock_mobile
