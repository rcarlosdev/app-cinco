nombre_paquete: inventario_logistica
dominio: inventario_logistica
version: 1.0.0
descripcion: >
  Capability Pack empresarial para incorporar procesos operativos de inventario y logistica
  sobre metadata gobernada, capabilities declaradas y respuesta evidence-first.
procesos_operativos:
  - inventario operativo por tecnico, empleado, movil, cuadrilla o brigada
  - inventario de materiales y ferretero
  - inventario serializado de equipos y CPE
  - validacion de seriales externos de proveedor contra bases actuales e historicas
  - kardex y movimientos por empleado o codigo
  - limitaciones documentales SAP, actas y documentos no habilitados
entidades:
  - cedula
  - movil
  - codigo
  - serial
  - bodega
fuentes_metadata_gobernada:
  - ai_dictionary.dd_sinonimos
  - ai_dictionary.dd_reglas
  - ai_dictionary.ia_dev_capacidades_columna
limitaciones_declaradas:
  - documentos_sap_y_actas_no_habilitados
  - missing_physical_column:bodega_destino
  - serializados_employee_kardex_not_available
  - result_set_empty
  - aclaracion_portador_requerida
  - scope_required:operacion_hfc
  - attachment_required
  - provider_file_empty
  - serial_column_not_detected
capacidades:
  - capability_id: inventory_stock_balance_by_mobile
    template_id: inventory_material_stock_mobile
    planner_route_hint: inventory.material_stock.mobile
    response_profile: inventory.stock.mobile.detail
    tools:
      - inventory_stock_balance_by_mobile
      - query_execution_planner.sql_assisted
    approval_policy: auto_read_only
    reglas:
      - inventario.route.stock_balance_holder
      - inventario.scope.dual_block_unspecified_family
    evaluaciones:
      - inventario_runtime_eval_v1
    limitaciones:
      - result_set_empty
      - aclaracion_portador_requerida
  - capability_id: inventory_stock_balance_by_material_dimension
    template_id: inventory_material_stock_grouped_dimension
    planner_route_hint: inventory.material_stock.dimension
    response_profile: inventory.stock.dimension.summary
    tools:
      - query_execution_planner.sql_assisted
    approval_policy: auto_read_only
    reglas:
      - inventario.route.stock_balance_material_grouped_dimension
      - inventario.metric.stock_include_zero_negative
    evaluaciones:
      - inventario_runtime_eval_v1
    limitaciones:
      - result_set_empty
  - capability_id: inventory_serial_stock_by_family_grouped_dimension
    template_id: inventory_serial_stock_by_family_grouped_dimension
    planner_route_hint: inventory.serial_stock.family_dimension
    response_profile: inventory.serial.stock.dimension.detail
    tools:
      - query_execution_planner.sql_assisted
    approval_policy: auto_read_only
    reglas:
      - inventario.route.serial_stock_family_grouped_dimension
      - inventario.metric.serial_count_only
    evaluaciones:
      - inventario_runtime_eval_v1
    limitaciones:
      - result_set_empty
  - capability_id: inventory_stock_balance_by_warehouse
    template_id: inventory_material_stock_by_warehouse
    planner_route_hint: inventory.material_stock.warehouse
    response_profile: inventory.stock.warehouse.detail
    tools:
      - inventory_stock_balance_by_warehouse
      - query_execution_planner.sql_assisted
    approval_policy: auto_read_only
    reglas:
      - inventario.metric.stock_include_zero_negative
    evaluaciones:
      - inventario_runtime_eval_v1
    limitaciones:
      - result_set_empty
  - capability_id: inventory_stock_balance
    template_id: inventory_material_stock_balance
    planner_route_hint: inventory.material_stock.balance
