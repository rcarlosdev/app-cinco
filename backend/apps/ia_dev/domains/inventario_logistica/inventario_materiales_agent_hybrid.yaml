# -------------------------------------------------------------------
# 13. LOADER / SINCRONIZACIÓN SUGERIDA
# -------------------------------------------------------------------

python_integration:
  package_name: apps.ia_dev.domains.inventario_materiales
  suggested_files:
    yaml_agent_loader.py:
      purpose: Cargar YAML y exponer conceptos, tablas, relaciones y ejemplos.
      functions:
        - load_inventory_agent_yaml
        - get_tables_for_dictionary
        - get_fields_for_dictionary
        - get_relationships_for_dictionary
        - get_synonyms_for_dictionary
        - get_groupable_dimensions
        - get_business_concepts
        - get_examples_as_query_patterns

    sync_yaml_agent_to_dictionary.py:
      purpose: Comando management para sembrar ai_dictionary desde YAML.
      command: python manage.py sync_yaml_agent_to_dictionary --agent inventario_materiales --dry-run
      modes:
        - dry_run
        - apply
        - audit_only

    audit_yaml_agent_against_db.py:
      purpose: Validar que tablas y columnas del YAML existen físicamente en DB.
      command: python manage.py audit_yaml_agent_against_db --agent inventario_materiales

    tests:
      purpose: Tests generados desde examples y quality_gates.

  loader_skeleton: |
    from pathlib import Path
    import yaml

    DEFAULT_AGENT_PATH = Path(__file__).with_name("inventario_materiales_agent.yaml")

    def load_inventory_agent_yaml(path: str | None = None) -> dict:
        yaml_path = Path(path) if path else DEFAULT_AGENT_PATH
        with yaml_path.open("r", encoding="utf-8") as fh:
            return yaml.safe_load(fh)

    def get_tables_for_dictionary(config: dict) -> list[dict]:
        rows = []
        for table_name, table in config.get("tables", {}).items():
            rows.append({
                "domain_code": table.get("domain_code"),
                "table_name": table_name,
                "business_name": table.get("business_name"),
                "description": table.get("description"),
                "primary_role": table.get("primary_role"),
                "material_family": table.get("material_family"),
            })
        return rows

    def get_fields_for_dictionary(config: dict) -> list[dict]:
        rows = []
        for table_name, table in config.get("tables", {}).items():
            for column_name, column in table.get("columns", {}).items():
                rows.append({
                    "table_name": table_name,
                    "column_name": column_name,
                    "data_type": column.get("data_type"),
                    "semantic_role": column.get("semantic_role"),
                    "business_concepts": column.get("business_concepts", []),
                    "allowed_operations": column.get("allowed_operations", []),
                    "synonyms": column.get("synonyms", []),
                    "is_groupable": column.get("is_groupable", False),
                    "is_filterable": column.get("is_filterable", False),
                    "is_selectable": column.get("is_selectable", False),
                })
        return rows

    def get_relationships_for_dictionary(config: dict) -> list[dict]:
        return [
            {"code": code, **relationship}
            for code, relationship in config.get("relationships", {}).items()
        ]

    def get_examples_as_query_patterns(config: dict) -> list[dict]:
        return config.get("examples", [])

# -------------------------------------------------------------------
# 14. QUALITY GATES
# -------------------------------------------------------------------

quality_gates:
  yaml_integrity:
    - El YAML debe cargar sin errores.
    - agent.code debe ser inventario_materiales_agent.
    - business_domain.code debe ser inventario_materiales.
    - Todas las tablas en relationships deben existir en tables.
    - Todas las columnas en relationships deben existir en su tabla.
    - Toda dimensión en groupable_dimensions debe apuntar a campos existentes o marcar missing_metadata_allowed.
    - Todo example debe tener expected.domain.
    - Todo example debe tener expected.intent.

  db_audit:
    - Toda tabla marcada sync_to_dd_tablas debe existir en logistica_cinco.
    - Toda columna marcada sync_to_dd_campos debe existir físicamente o quedar en metadata_faltante.
    - Todo join permitido debe ser físicamente posible.
    - Todo campo tipo date debe validarse contra tipo real de DB.
    - Todo campo group_by debe ser agrupable en SQL.

  runtime_readiness:
    - sync_yaml_agent_to_dictionary --dry-run no debe fallar.
    - audit_yaml_agent_against_db debe reportar missing_metadata explícito.
    - ia_dictionary_audit --domain inventario_materiales debe pasar antes de producción.
    - Las consultas de examples deben generar query_patterns.
    - Ningún example debe depender de fallback legacy.

# -------------------------------------------------------------------
# 15. PENDIENTES PARA COMPLETAR CON DATOS REALES
# -------------------------------------------------------------------

fill_with_real_db_metadata:
  required:
    - Confirmar nombres exactos de columnas en cada tabla.
    - Confirmar tipos reales de datos.
    - Confirmar primary keys.
    - Confirmar foreign keys reales o equivalentes.
    - Confirmar valores reales de movimiento en serializados.
    - Confirmar cómo se identifica consumo_movil.
    - Confirmar cómo se marca validado/sin validar.
    - Confirmar cómo distinguir materiales comunes vs ferreteros.
    - Validar en ai_dictionary/DB que cobros tienen columnas suficientes para descontar inventario por codigo, cantidad y fecha.
    - Validar en ai_dictionary/DB que traslados tienen origen, destino y tipo de traslado para separar bodega vs otro aliado.
    - Confirmar si existe saldo materializado o debe calcularse siempre por movimientos.

  recommended_commands:
    - python manage.py inspectdb --database logistica_cinco
    - python manage.py audit_yaml_agent_against_db --agent inventario_materiales
    - python manage.py sync_yaml_agent_to_dictionary --agent inventario_materiales --dry-run
    - python manage.py ia_dictionary_audit --domain inventario_materiales --as-json
    - python manage.py simulate_ia_dev_chat --message "stock de materiales por bodega" --session-id demo-inv --raw
