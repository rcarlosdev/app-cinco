# -------------------------------------------------------------------
# 8. TAXONOMÍA DE INTENCIONES
# -------------------------------------------------------------------

intent_taxonomy:
  stock_query:
    description: Consulta sobre existencias, saldos o disponibilidad.
    default_strategy: sql_assisted_after_dictionary_validation
    examples:
      - stock de materiales por bodega
      - existencias de ferreteros
      - materiales disponibles

  movement_query:
    description: Consulta sobre movimientos logísticos.
    default_strategy: sql_assisted_after_dictionary_validation
    examples:
      - entradas de materiales en mayo
      - entregas por técnico
      - traslados por bodega

  traceability_query:
    description: Consulta de historial o ubicación de un serial/material.
    default_strategy: sql_assisted_or_traceability_plan
    examples:
      - trazabilidad del serial ABC123
      - dónde está el equipo X
      - historial de movimientos del serial

  consumption_query:
    description: Consulta sobre consumo de materiales o equipos.
    default_strategy: sql_assisted_after_dictionary_validation
    examples:
      - materiales más consumidos
      - consumos por móvil
      - consumo por responsable

  charge_query:
    description: Consulta sobre cobros.
    default_strategy: sql_assisted_after_dictionary_validation
    examples:
      - materiales cobrados
      - cobros pendientes
      - cobros por contratista

  return_query:
    description: Consulta sobre devoluciones.
    default_strategy: sql_assisted_after_dictionary_validation
    examples:
      - devoluciones por técnico
      - material devuelto en mayo

  transfer_query:
    description: Consulta sobre traslados.
    default_strategy: sql_assisted_after_dictionary_validation
    examples:
      - traslados por bodega destino
      - materiales trasladados este mes

  association_query:
    description: Consulta sobre seriales asociados, asignados o salidos de bodega.
    default_strategy: sql_assisted_after_dictionary_validation
    examples:
      - seriales asociados que salieron de bodega
      - equipos asociados a un móvil

  risk_detection:
    description: Consulta de riesgos, pendientes o inconsistencias.
    default_strategy: sql_assisted_plus_business_response
    examples:
      - consumo móvil sin validar
      - seriales sin ubicación
      - materiales con movimientos inconsistentes

  movement_history:
    description: Consulta de historial completo, kardex consolidado, log consolidado o linea de tiempo logistica.
    default_strategy: sql_assisted_after_dictionary_validation
    examples:
      - historial completo del codigo ABC
      - kardex consolidado del material ABC
      - consolidado de kardex y log

  report_generation:
    description: Solicitud de informe empresarial con dato, tabla, hallazgo, riesgo, recomendacion y siguiente accion.
    default_strategy: semantic_report
    examples:
      - informe de inventario
      - informe de conciliacion
      - reporte de saldos por area

  reconciliation_query:
    description: Consulta comparativa o conciliacion entre movimientos, stock, consumo, facturacion o fuentes externas.
    default_strategy: semantic_report_or_sql_assisted_after_validation
    examples:
      - comparativo ingreso stock bodega movil facturacion
      - consumo tecnico vs facturacion por proyecto
      - entrega consumo tecnico facturacion

  document_generation:
    description: Solicitud de generacion de actas, SPA o documento soporte derivado de movimientos logisticos.
    default_strategy: document_generation_pending
    examples:
      - generar acta de ingreso
      - generar SPA de traslado
      - documento soporte del traslado

  alert_query:
    description: Consulta para identificar alertas operativas o materiales con compra requerida.
    default_strategy: semantic_report
    examples:
      - alerta ferretero para compras
      - materiales que requieren compra
      - alertar a directores por faltantes

  notification_query:
    description: Consulta sobre llegada a logistica, notificaciones operativas o pendientes por recibir.
    default_strategy: external_source_pending
    examples:
      - ingresos de compras pendientes por logistica
      - notificar llegada de materiales a logistica

  assignment_distribution_query:
    description: Consulta sobre distribucion, asignacion o responsable logistica de materiales y equipos.
    default_strategy: semantic_report
    examples:
      - distribucion por tecnico
      - asignacion de equipos

  external_reconciliation_query:
    description: Conciliacion contra fuentes externas como SAP o sistemas de compras o facturacion.
    default_strategy: external_source_pending
    examples:
      - cruce de saldos SAP contra kardex
      - diferencias entre SAP y consumo

# -------------------------------------------------------------------
# 9. REGLAS DE NEGOCIO
# -------------------------------------------------------------------

business_rules:
  stock_calculation:
    description: >
      El cálculo de stock debe usar movimientos reales y debe declarar claramente
      qué movimientos suman y cuáles restan.
    confirmed_components:
      add:
        - entradas
        - devoluciones
        - traslados_entrantes
      subtract:
        - entregas
        - consumos
        - cobros
        - traslados_salientes
    confirmed_business_rules:
      - Cobro descuenta inventario en el momento del cobro, aunque la factura se genere despues.
      - Traslado bodega sale de una bodega e ingresa a otra.
      - Traslado otro aliado sale del inventario propio.
      - Facturacion no reemplaza el movimiento logistico para calcular saldo.
    pending_db_validation:
      - Confirmar columnas de cantidad, fecha, codigo, bodega, origen, destino y tipo_movimiento en tablas de movimiento.
      - Confirmar valores fisicos que identifican traslado_bodega y traslado_otro_aliado.
      - Confirmar si existe saldo materializado o si siempre debe calcularse por movimientos.
    metadata_tags:
      - stock
      - inventory_balance
      - movement_based_metric

  serialized_control:
    description: >
      Los serializados se controlan individualmente por serial. No deben resumirse
      solo por cantidad si la pregunta pide trazabilidad, ubicación, responsable o estado.
    rule: serial_is_primary_identifier
    metadata_tags:
      - traceability
      - serial_control

  mobile_consumption_pending_validation:
    description: >
      El consumo móvil sin validar representa posible riesgo operativo.
    detection:
      movement_field: logistica_base_seriales.movimiento_sap
      expected_movement_value: consumo_movil
      validation_field: logistica_base_seriales.validado
      pending_value: false
    metadata_tags:
      - risk_detection
      - pending_validation

  contractor_vs_company_materials:
    description: >
      Materiales comunes y ferreteros deben diferenciarse cuando la consulta hable
      de propiedad, costo, cobro o responsabilidad.
    metadata_tags:
      - ownership
      - material_family

  no_data_fabrication:
    description: >
      Si no hay conexión a DB o metadata validada, el agente puede explicar el criterio,
      pero no debe inventar cantidades, saldos, seriales ni movimientos.
    metadata_tags:
      - safety
      - no_hallucination

  consolidated_kardex_rule:
    description: >
      El kardex consolidado debe unificar ingresos, entregas, devoluciones, consumos,
      cobros, traslados y asociaciones de seriales sin inventar saldos materializados.
    requires_validation:
      - Confirmar orden cronologico y columnas de homologacion entre tablas.
    metadata_tags:
      - kardex
      - consolidation
      - traceability

  stock_balance_rule:
    description: >
      Todo saldo o stock solicitado debe responderse desde movimientos validados.
      La formula de negocio para materiales queda confirmada y habilitada solo
      con columnas fisicas auditadas en logistica_cinco. Las cantidades varchar
      se castean solo cuando pasan validacion numerica; registros invalidos se
      reportan y no se suman.
    requires_business_validation: false
    requires_db_validation: false
    validation_status: passed_2026_05_08
    confirmed_columns:
      - logistica_movimientos_entrada.codigo/cantidad/f_consumo/bodega/movimiento/estado/comentario
      - logistica_movimientos_entrega.codigo/cantidad/f_consumo/bodega
      - logistica_movimientos_devolucion.codigo/cantidad/f_consumo/bodega
      - logistica_movimientos_consumo.codigo/cantidad/f_consumo/bodega/orden_trabajo/tipo/estado
      - logistica_movimientos_cobro.codigo/cantidad/f_consumo/bodega
      - logistica_movimientos_traslado.codigo/cantidad/f_consumo/bodega/movimiento/estado/comentario
    blocked_columns:
      - logistica_movimientos_traslado.bodega_destino
      - bajas
      - garantias_materiales
    confirmed_formulas:
      saldo_general_materiales: entradas - entregas + devoluciones - cobros - traslados_otro_aliado
      saldo_bodega_materiales: entradas - entregas + devoluciones - cobros - traslados_otro_aliado +/- traslados_bodega
      saldo_movil: entregas - consumo - cobros - devoluciones
      bajas: 0
      garantias_materiales: 0
    metadata_tags:
      - stock
      - db_validation_required

  ingreso_stock_movil_facturacion_rule:
    description: >
      La conciliacion ingreso - stock bodega - movil - facturacion fue marcada
      por negocio como no aplicable y no debe activarse como calculo productivo.
    status: not_applicable
    requires_business_validation: false
    metadata_tags:
      - reconciliation
      - semantic_limitation

  consumo_tecnico_facturacion_rule:
    description: >
      El cruce entre consumo tecnico y facturacion requiere homologar codigo, cantidad,
      proyecto, documento y fecha entre consumo y facturacion.
    requires_validation:
      - Confirmar si facturacion existe en DB o llega por fuente externa.
    metadata_tags:
      - consumption
      - billing
      - reconciliation

  sap_kardex_reconciliation_rule:
    description: >
      La conciliacion SAP vs kardex solo puede ejecutarse cuando SAP este registrado
      como fuente o tabla en ai_dictionary con campos homologados.
    external_source_required: SAP
    metadata_tags:
      - sap
      - external_source
      - reconciliation

  document_generation_rule:
    description: >
      Las actas y SPA se entienden semantcamente como documentos derivados de movimientos,
      pero no deben generarse en productivo sin motor documental o modulo documental.
    metadata_tags:
      - documents
      - pending_generation

  purchasing_arrival_notification_rule:
    description: >
      El flujo compra -> ingreso -> llegada logistica -> notificacion depende de integrar
      compras y eventos de llegada o notificacion.
    metadata_tags:
      - purchases
      - notification
      - integration_pending

  ferretero_purchase_alert_rule:
    description: >
      La alerta ferretero requiere umbrales de stock minimo, punto de reposicion o reglas
      equivalentes antes de disparar compra requerida o aviso a directores.
    threshold_metadata_pending: true
    metadata_tags:
      - alert
      - ferreteros
      - replenishment

  area_balance_report_rule:
    description: >
      Los reportes de saldo por area requieren metadata valida de area responsable y criterio
      aprobado para asignar saldo a cada area.
    requires_validation:
      - Confirmar columna de area y responsable por cada movimiento relevante.
    metadata_tags:
      - reporting
      - organizational_distribution

external_sources:
  SAP:
    status: pending_integration
    purpose: conciliacion de saldos contra kardex
    required_fields:
      - codigo
      - saldo_sap
      - fecha_corte
      - centro
      - almacen

  Compras:
    status: pending_integration
    purpose: ingresos por compras y notificacion a logistica

  Facturacion:
    status: pending_integration_or_db_validation
    purpose: cruce consumo tecnico vs facturacion

  Documentos:
    status: pending_integration
    purpose: generacion de actas y SPA

# -------------------------------------------------------------------
# 10. PATRONES DE CONSULTA -> query_patterns / tests
# -------------------------------------------------------------------

query_patterns:
  grouping_operator_por:
    description: >
      En lenguaje de negocio, "por X" normalmente indica agrupación si X existe
      como dimensión agrupable declarada.
    operator: group_by
    examples:
      - stock por bodega
      - consumos por responsable
      - entradas por mes
      - equipos por estado
    validation_rule: X debe existir en groupable_dimensions o como campo con is_groupable=true.

  temporal_filtering:
    description: >
      Expresiones como hoy, este mes, mayo, 2026 deben mapearse a filtros temporales
      sobre campos tipo date declarados.
    examples:
      - entradas de mayo
      - consumos este mes
      - traslados de 2026
    validation_rule: La tabla objetivo debe tener campo fecha con allowed_operations de filtro temporal.

  serial_traceability:
    description: >
      Si la consulta menciona un serial específico, priorizar trazabilidad serial.
    examples:
      - trazabilidad del serial ABC123
      - dónde está el serial ABC123
    validation_rule: serial debe mapear a logistica_base_seriales.serial.

  stock_query_resolution:
    description: >
      Las consultas de stock requieren cálculo por movimientos y no deben responderse
      desde una sola tabla si el saldo no está materializado.
    examples:
      - stock de materiales
      - existencias por bodega
    validation_rule: usar business_rules.stock_calculation.

