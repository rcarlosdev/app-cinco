# inventario_materiales_agent.yaml
# Enfoque híbrido recomendado:
#   YAML = contexto semántico, entrenamiento, reglas de negocio, ejemplos y blueprint.
#   ai_dictionary = autoridad estructural productiva.
#   DB = realidad física.
#   QueryExecutionPlanner = ejecución SQL segura.
#   GPT/OpenAI = arbitraje semántico.
#
# Este YAML está diseñado para poder mapearse así:
#   YAML.tables           -> dd_tablas / dd_campos
#   YAML.relationships    -> dd_relaciones
#   YAML.synonyms         -> dd_sinonimos
#   YAML.groupable        -> operaciones group_by
#   YAML.business_rules   -> metadata semántica
#   YAML.examples         -> tests / query_patterns

agent:
  code: inventario_materiales_agent
  name: Agente de Inventario de Materiales
  version: 0.3.0
  status: experimental_yaml_first_hybrid
  runtime_mode: yaml_first_to_ai_dictionary
  domain_code: inventario_materiales
  database:
    connection_alias: logistica_cinco
    schema: null
    main_tables:
      serializados:
        - base_codigo_seriales
        - logistica_base_seriales
        - logistica_seriales_asociados
      materiales_y_ferreteros:
        - base_codigos
        - logistica_movimientos_entrada
        - logistica_movimientos_entrega
        - logistica_movimientos_devolucion
        - logistica_movimientos_consumo
        - logistica_movimientos_cobro
        - logistica_movimientos_traslado
  description: >
    Agente especializado en control y análisis de inventario de materiales,
    ferreteros y equipos serializados. Debe interpretar consultas de negocio
    sobre stock, entradas, entregas, devoluciones, consumos, cobros, traslados,
    trazabilidad, seriales asociados y riesgos operativos.

architecture_contract:
  yaml_role: contexto_semantico_y_blueprint_de_entrenamiento
  ai_dictionary_role: autoridad_estructural_productiva
  db_role: realidad_fisica_de_tablas_y_columnas
  planner_role: ejecucion_sql_segura
  gpt_role: arbitraje_semantico
  execution_policy:
    sql_execution_allowed_from_yaml_directly: false
    must_sync_to_ai_dictionary_before_sql_assisted: true
    must_validate_against_db_before_production: true
  principles:
    - El YAML enseña el negocio.
    - La DB confirma la realidad física.
    - ai_dictionary gobierna tablas, campos, relaciones y operaciones.
    - GPT interpreta intención y conceptos.
    - El planner ejecuta únicamente planes seguros.
  never_do:
    - No hardcodear frases.
    - No generar SQL libre desde YAML.
    - No crear handler si sql_assisted puede resolver.
    - No usar fallback como implementación.
    - No usar legacy como autoridad.
    - No inventar columnas.
    - No inventar saldos reales sin consulta a DB.

# -------------------------------------------------------------------
# 1. MAPEO DIRECTO A ai_dictionary
# -------------------------------------------------------------------

ai_dictionary_mapping:
  dd_dominios:
    source: business_domain
    key_fields:
      - code
      - name
      - description
  dd_tablas:
    source: tables
    key_fields:
      - table_name
      - domain_code
      - business_name
      - description
      - primary_role
      - material_family
  dd_campos:
    source: tables.*.columns
    key_fields:
      - table_name
      - column_name
      - data_type
      - semantic_role
      - business_concepts
      - allowed_operations
      - is_groupable
      - is_filterable
      - is_selectable
  dd_relaciones:
    source: relationships
    key_fields:
      - from_table
      - from_column
      - to_table
      - to_column
      - relationship_type
      - allowed
      - join_purpose
  dd_sinonimos:
    source:
      - synonyms
      - tables.*.columns.*.synonyms
      - business_concepts.*.synonyms
      - groupable_dimensions.*.synonyms
    key_fields:
      - synonym
      - canonical_value
      - target_type
      - target_table
      - target_column
      - domain_code
  semantic_metadata:
    source:
      - business_concepts
      - business_rules
      - query_patterns
      - groupable_dimensions

business_domain:
  code: inventario_materiales
  name: Inventario de materiales
  description: >
    Dominio logístico para control, trazabilidad, análisis y gestión de inventarios
    de materiales comunes, materiales ferreteros y equipos serializados.
  business_scope:
    - stock de materiales
    - entradas
    - entregas
    - devoluciones
    - consumos
    - cobros
    - traslados
    - trazabilidad de seriales
    - equipos asociados
    - salidas de bodega
    - consumo móvil sin validar
    - riesgos de inventario
  out_of_scope:
    - contabilidad financiera completa
    - compras detalladas si no existen tablas declaradas
    - nómina
    - ausentismo
    - mantenimiento técnico no registrado en logística

# -------------------------------------------------------------------
# 2. FAMILIAS DE MATERIAL
# -------------------------------------------------------------------

material_families:
  materiales:
    code: materiales
    name: Materiales comunes
    ownership: contratante
    serial_control: false
    description: >
      Materiales entregados por el contratante. Se controlan por código, cantidad,
      bodega y movimientos logísticos.
    catalog_table: base_codigos
    movement_tables:
      - logistica_movimientos_entrada
      - logistica_movimientos_entrega
      - logistica_movimientos_devolucion
      - logistica_movimientos_consumo
      - logistica_movimientos_cobro
      - logistica_movimientos_traslado

  ferreteros:
    code: ferreteros
    name: Materiales ferreteros
    ownership: compania
    serial_control: false
    description: >
      Materiales comprados por la compañía. Se controlan por código y cantidad.
      Pueden requerir análisis separado por propiedad, costo, uso o cobro.
    catalog_table: base_codigos
    movement_tables:
      - logistica_movimientos_entrada
      - logistica_movimientos_entrega
      - logistica_movimientos_devolucion
      - logistica_movimientos_consumo
      - logistica_movimientos_cobro
      - logistica_movimientos_traslado

  serializados:
    code: serializados
    name: Equipos serializados
    ownership: mixto_o_por_definir
    serial_control: true
    description: >
      Equipos controlados individualmente por serial. Requieren trazabilidad por
      serial, estado, ubicación, responsable, movimiento, asociación y salida de bodega.
    catalog_table: base_codigo_seriales
    serial_table: logistica_base_seriales
    association_table: logistica_seriales_asociados

