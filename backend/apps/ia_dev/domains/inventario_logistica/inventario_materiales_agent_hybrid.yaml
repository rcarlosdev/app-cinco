# -------------------------------------------------------------------
# 6. CONCEPTOS DE NEGOCIO -> metadata semántica
# -------------------------------------------------------------------

business_concepts:
  stock_actual:
    description: Existencia disponible actual calculada a partir de movimientos.
    applies_to: [materiales, ferreteros]
    preferred_intent: stock_query
    semantic_formula:
      description: >
        El stock se debe calcular con movimientos reales. Negocio confirma que
        el cobro descuenta inventario en el momento del cobro aunque la factura
        se genere despues. Facturacion no descuenta inventario. Traslado bodega
        se representa por doble registro: salida en logistica_movimientos_traslado
        y entrada en logistica_movimientos_entrada. Traslado a otro aliado sale
        del inventario propio.
      confirmed_formula: entradas - entregas + devoluciones - cobros - traslados_otro_aliado
      stock_bodega_formula: entradas - entregas + devoluciones - cobros - traslados_otro_aliado +/- traslados_bodega
      stock_movil_formula: entregas - consumo - cobros - devoluciones
      bajas_materiales: 0
      garantias_materiales: 0
      requires_business_validation: false
      requires_db_validation: false
      db_validation_status: passed_2026_05_08
    required_tables:
      - logistica_movimientos_entrada
      - logistica_movimientos_entrega
      - logistica_movimientos_devolucion
      - logistica_movimientos_consumo
      - logistica_movimientos_cobro
      - logistica_movimientos_traslado
    metrics:
      - saldo
      - entradas
      - entregas
      - devoluciones
      - consumos
      - cobros
      - traslados

  trazabilidad_serial:
    description: Historia completa de un equipo controlado por serial.
    applies_to: [serializados]
    preferred_intent: traceability_query
    primary_identifier:
      table: logistica_base_seriales
      field: serial
    required_tables:
      - logistica_base_seriales
      - logistica_seriales_asociados
      - base_codigo_seriales
    expected_output:
      - serial
      - codigo
      - descripcion
      - estado_actual
      - ubicacion_actual
      - responsable
      - ultimo_movimiento
      - historial

  consumo_movil_sin_validar:
    description: Equipos o materiales registrados como consumo móvil pendientes de validación.
    applies_to: [serializados]
    preferred_intent: risk_detection
    maps_to:
      table: logistica_base_seriales
      movement_field: movimiento
      validation_field: validado
    filters:
      movimiento: consumo_movil
      validado: false
    risk_level: medium
    expected_output:
      - serial
      - codigo
      - movimiento
      - fecha
      - responsable
      - riesgo
      - accion_sugerida

  materiales_mas_consumidos:
    description: Ranking de materiales por cantidad consumida.
    applies_to: [materiales, ferreteros]
